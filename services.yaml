---
# ── User Service Deployment ───────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: restaurant/user-service:1.0.0
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
          env:
            - name: DB_HOST
              value: postgres-users
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: restaurant_users
            - name: DB_USER
              value: postgres
            - name: DB_PASS
              value: postgres
            - name: JWT_SECRET
              value: ember-oak-secret-key-change-in-production
          readinessProbe:
            httpGet:
              path: /api/users/health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /api/users/health
              port: 8081
            initialDelaySeconds: 90
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
spec:
  selector:
    app: user-service
  ports:
    - port: 8081
      targetPort: 8081
