# ── API Gateway ───────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata: { name: api-gateway }
spec:
  replicas: 2
  selector:
    matchLabels: { app: api-gateway }
  template:
    metadata:
      labels: { app: api-gateway }
    spec:
      containers:
      - name: api-gateway
        image: restaurant/api-gateway:1.0.0
        ports: [{ containerPort: 8080 }]
        env:
        - { name: USER_SERVICE_HOST,        value: user-service }
        - { name: MENU_SERVICE_HOST,        value: menu-service }
        - { name: ORDER_SERVICE_HOST,       value: order-service }
        - { name: RESERVATION_SERVICE_HOST, value: reservation-service }
---
apiVersion: v1
kind: Service
metadata: { name: api-gateway }
spec:
  selector: { app: api-gateway }
  type: LoadBalancer
  ports: [{ port: 80, targetPort: 8080 }]
