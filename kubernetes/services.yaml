# ── User Service ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata: { name: user-service }
spec:
  replicas: 2
  selector:
    matchLabels: { app: user-service }
  template:
    metadata:
      labels: { app: user-service }
    spec:
      containers:
      - name: user-service
        image: restaurant/user-service:1.0.0
        ports: [{ containerPort: 8081 }]
        envFrom: [{ configMapRef: { name: restaurant-config } }]
        env:
        - { name: DB_HOST, value: postgres-users }
        - { name: DB_NAME, valueFrom: { configMapKeyRef: { name: restaurant-config, key: USER_DB_NAME } } }
        readinessProbe:
          httpGet: { path: /api/users/health, port: 8081 }
          initialDelaySeconds: 30
        livenessProbe:
          httpGet: { path: /api/users/health, port: 8081 }
          initialDelaySeconds: 60
---
apiVersion: v1
kind: Service
metadata: { name: user-service }
spec:
  selector: { app: user-service }
  ports: [{ port: 8081, targetPort: 8081 }]
---
