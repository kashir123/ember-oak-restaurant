server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        - id: user-service
          uri: http://${USER_SERVICE_HOST:localhost}:8081
          predicates:
            - Path=/api/users/**

        - id: menu-service
          uri: http://${MENU_SERVICE_HOST:localhost}:8082
          predicates:
            - Path=/api/menu/**

        - id: order-service
          uri: http://${ORDER_SERVICE_HOST:localhost}:8083
          predicates:
            - Path=/api/orders/**

        - id: reservation-service
          uri: http://${RESERVATION_SERVICE_HOST:localhost}:8084
          predicates:
            - Path=/api/reservations/**
