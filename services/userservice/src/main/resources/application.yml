server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:restaurant_users}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:ember-oak-secret-key-change-in-production-must-be-256-bits}
  expiration: 86400000   # 24 hours in ms

app:
  mail:
    from: ${MAIL_FROM:noreply@emberandoak.com}

logging:
  level:
    com.restaurant: DEBUG
