version: '3.8'

services:

  # ── Databases ────────────────────────────────────────────────

  postgres-users:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: restaurant_users
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - users_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-menu:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: restaurant_menu
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - menu_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-orders:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: restaurant_orders
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - orders_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-reservations:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: restaurant_reservations
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - reservations_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Mail (local dev only) ──────────────────────────────────────

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

  # ── Microservices ─────────────────────────────────────────────

  user-service:
    build: ./services/userservice
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres-users
      DB_PORT: 5432
      DB_NAME: restaurant_users
      DB_USER: postgres
      DB_PASS: postgres
      JWT_SECRET: ember-oak-secret-key-change-in-production
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      MAIL_FROM: noreply@emberandoak.com
    depends_on:
      postgres-users:
        condition: service_healthy
      mailhog:
        condition: service_started
    restart: on-failure

  menu-service:
    build: ./services/menuservice
    ports:
      - "8082:8082"
    environment:
      DB_HOST: postgres-menu
      DB_PORT: 5432
      DB_NAME: restaurant_menu
      DB_USER: postgres
      DB_PASS: postgres
    depends_on:
      postgres-menu:
        condition: service_healthy
    restart: on-failure

  order-service:
    build: ./services/orderservice
    ports:
      - "8083:8083"
    environment:
      DB_HOST: postgres-orders
      DB_PORT: 5432
      DB_NAME: restaurant_orders
      DB_USER: postgres
      DB_PASS: postgres
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      MAIL_FROM: noreply@emberandoak.com
    depends_on:
      postgres-orders:
        condition: service_healthy
      mailhog:
        condition: service_started
    restart: on-failure

  reservation-service:
    build: ./services/reservationservice
    ports:
      - "8084:8084"
    environment:
      DB_HOST: postgres-reservations
      DB_PORT: 5432
      DB_NAME: restaurant_reservations
      DB_USER: postgres
      DB_PASS: postgres
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      MAIL_FROM: noreply@emberandoak.com
    depends_on:
      postgres-reservations:
        condition: service_healthy
      mailhog:
        condition: service_started
    restart: on-failure

  # ── API Gateway ───────────────────────────────────────────────

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      USER_SERVICE_HOST: user-service
      MENU_SERVICE_HOST: menu-service
      ORDER_SERVICE_HOST: order-service
      RESERVATION_SERVICE_HOST: reservation-service
    depends_on:
      - user-service
      - menu-service
      - order-service
      - reservation-service
    restart: on-failure

  # ── Frontend ──────────────────────────────────────────────────

  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api-gateway

volumes:
  users_data:
  menu_data:
  orders_data:
  reservations_data:
